<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Checking...</span>
    </div>

    <label class="toggle">
      <input type="checkbox" id="capture-toggle">
      <span>Capture downloads automatically</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="debug-toggle">
      <span>Debug logging</span>
    </label>

    <div class="blocklist-section">
      <button id="ignore-site" class="ignore-btn">Ignore this site</button>
      <div id="blocklist-items" class="blocklist-items"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
