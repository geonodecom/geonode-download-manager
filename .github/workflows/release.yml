name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  meta:
    if: contains(github.event.head_commit.message, 'RELEASE ')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse RELEASE version
        id: version
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          if [[ ! "$COMMIT_MESSAGE" =~ RELEASE[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "Commit message does not match RELEASE x.y.z; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${BASH_REMATCH[1]}"
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

  android:
    needs: meta
    if: needs.meta.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Bump pubspec version in workspace
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.meta.outputs.version }}"
          BUILD="${{ github.run_number }}"
          sed -i -E "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          grep -E '^version:' pubspec.yaml

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Fetch bundled Android tools
        shell: pwsh
        run: powershell -File tool/android/fetch_deps.ps1

      - name: Build Android APK
        run: flutter build apk --release

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.meta.outputs.version }}"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/geonode-download-manager-${VERSION}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: dist/geonode-download-manager-${{ needs.meta.outputs.version }}.apk
          if-no-files-found: error

  windows:
    needs: meta
    if: needs.meta.outputs.skip == 'false'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Bump pubspec version in workspace
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.meta.outputs.version }}"
          BUILD="${{ github.run_number }}"
          sed -i -E "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          grep -E '^version:' pubspec.yaml

      - name: Build Windows release
        shell: pwsh
        run: powershell -File tool/windows/build.ps1

      - name: Package Windows zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Version = "${{ needs.meta.outputs.version }}"
          $StageName = "geonode-download-manager-$Version-windows-x64"
          $Stage = Join-Path "dist" $StageName
          $Zip = Join-Path "dist" "$StageName.zip"
          $ReleaseDir = "build\windows\x64\runner\Release"
          $HostExe = "build\geonode-download-manager-host.exe"

          New-Item -ItemType Directory -Force -Path $Stage | Out-Null
          Copy-Item -Path (Join-Path $ReleaseDir "*") -Destination $Stage -Recurse -Force
          if (-not (Test-Path $HostExe)) {
            throw "Missing host binary: $HostExe"
          }
          Copy-Item -Force $HostExe $Stage

          foreach ($tool in @("aria2c.exe", "yt-dlp.exe", "ffmpeg.exe")) {
            $path = Join-Path $Stage "bin\$tool"
            if (-not (Test-Path $path)) {
              throw "Missing bundled tool in release: $path"
            }
          }

          if (Test-Path $Zip) { Remove-Item -Force $Zip }
          Compress-Archive -Path (Join-Path $Stage "*") -DestinationPath $Zip
          Get-Item $Zip | Format-List FullName, Length

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/geonode-download-manager-${{ needs.meta.outputs.version }}-windows-x64.zip
          if-no-files-found: error

  publish:
    needs: [meta, android, windows]
    if: needs.meta.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: release-android
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/geonode-download-manager-${{ needs.meta.outputs.version }}.apk
            dist/geonode-download-manager-${{ needs.meta.outputs.version }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
