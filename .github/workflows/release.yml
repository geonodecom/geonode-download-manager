name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: contains(github.event.head_commit.message, 'RELEASE ')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse RELEASE version
        id: version
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          if [[ ! "$COMMIT_MESSAGE" =~ RELEASE[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "Commit message does not match RELEASE x.y.z; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${BASH_REMATCH[1]}"
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        if: steps.version.outputs.skip != 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.version.outputs.skip != 'true'
        run: flutter pub get

      - name: Generate code
        if: steps.version.outputs.skip != 'true'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Bump pubspec version in workspace
        if: steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ github.run_number }}"
          sed -i -E "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          grep -E '^version:' pubspec.yaml

      - name: Analyze
        if: steps.version.outputs.skip != 'true'
        run: flutter analyze

      - name: Test
        if: steps.version.outputs.skip != 'true'
        run: flutter test

      - name: Build Android APK
        if: steps.version.outputs.skip != 'true'
        run: flutter build apk --release

      - name: Prepare artifact
        if: steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/geonode-download-manager-${VERSION}.apk"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/geonode-download-manager-${{ steps.version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
