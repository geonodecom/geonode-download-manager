name: geonode_download_manager
description: Fast, opinionated download manager powered by aria2.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  drift: ^2.34.0
  drift_flutter: ^0.3.0
  file_selector: ^1.1.0
  flutter_riverpod: ^3.3.2
  material_symbols_icons: ^4.2951.0
  path: ^1.9.1
  path_provider: ^2.1.6
  tray_manager: ^0.5.3
  uuid: ^4.5.2
  window_manager: ^0.5.1
  youtube_explode_dart: ^3.1.0
  http: ^1.6.0
  flutter_secure_storage: ^10.3.1
  webview_flutter: ^4.14.1
  webview_flutter_android: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - images/appicon.png
    - images/icon.png
    - images/tray-icon.png
    - images/tray-icon.ico
